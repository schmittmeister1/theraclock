name: Build Android app (.aab)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['android/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build signed .aab with Bubblewrap
        working-directory: android
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -o pipefail
          {
            echo "== versions =="
            node --version
            java -version 2>&1
            echo "JAVA_HOME=$JAVA_HOME"
            echo "ANDROID_HOME=$ANDROID_HOME"

            echo "== install bubblewrap =="
            npm install -g @bubblewrap/cli

            echo "== restore keystore (contents redacted) =="
            echo "$KS_B64" | tr -d ' \n\r' | base64 -d > upload.keystore
            ls -la upload.keystore
            [ -s upload.keystore ] || { echo "FATAL: the ANDROID_KEYSTORE_B64 secret is empty or missing — re-add it in repo Settings -> Secrets and variables -> Actions"; exit 1; }
            [ -n "$KS_PASS" ] || { echo "FATAL: the KEYSTORE_PASSWORD secret is empty or missing"; exit 1; }
            keytool -list -keystore upload.keystore -storepass "$KS_PASS" -alias upload > /dev/null || { echo "FATAL: keystore/password don't match — check both secrets"; exit 1; }

            echo "== bubblewrap config =="
            mkdir -p ~/.bubblewrap
            printf '{"jdkPath": "%s", "androidSdkPath": "%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
            cat ~/.bubblewrap/config.json
            (yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1) || echo "license step skipped"

            echo "== bubblewrap update (generates the Android project) =="
            bubblewrap update --skipVersionUpgrade

            echo "== gradle build (unsigned bundle) =="
            chmod +x ./gradlew
            ./gradlew --no-daemon bundleRelease

            echo "== sign the bundle =="
            cp app/build/outputs/bundle/release/app-release.aab ./unsigned.aab
            jarsigner -keystore upload.keystore -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -signedjar app-release-bundle.aab unsigned.aab upload
            jarsigner -verify app-release-bundle.aab

            echo "== outputs =="
            ls -la ./*.aab
          } 2>&1 | tee build.log

      - name: Push log to ci-logs branch (readable via git)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/build.log /tmp/build.log 2>/dev/null || echo "build.log missing" > /tmp/build.log
          mkdir /tmp/cilogs && cd /tmp/cilogs
          git init -q -b ci-logs
          cp /tmp/build.log build.log
          git -c user.name=theraclock-ci -c user.email=ci@users.noreply.github.com add build.log
          git -c user.name=theraclock-ci -c user.email=ci@users.noreply.github.com commit -qm "build log for run ${{ github.run_number }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" ci-logs

      - name: Publish outputs and log as a release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          STATUS="${{ job.status }}"
          gh release create "$TAG" \
            --title "Android build ${{ github.run_number }} ($STATUS)" \
            --notes "Automated Bubblewrap build. Package: io.github.schmittmeister1.theraclock — see build.log for details." \
            android/build.log || true
          gh release upload "$TAG" android/app-release-bundle.aab || true
          gh release upload "$TAG" android/app-release-signed.apk || true

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theraclock-android
          path: |
            android/build.log
            android/app-release-bundle.aab
            android/app-release-signed.apk
